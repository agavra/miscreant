# Example miscreant configuration file. Every key is optional; pass this
# file with `--config miscreant.example.toml` (or MISCREANT_CONFIG=...).
# Precedence is CLI flag > MISCREANT_* environment variable > this file >
# the built-in default shown below for each key.

# Address the HTTP server listens on.
bind_addr = "127.0.0.1:8470"

# Object storage URL backing all repository data.
storage_url = "file://./miscreant-data"

# Blob contents at or below this many bytes are stored inline in SlateDB;
# larger blobs are offloaded to object storage.
inline_threshold = 65536

# Create unknown repositories on first push.
auto_create_repos = true

# Local directory for per-request pack staging. The built-in default is the
# system temp directory joined with "miscreant-staging"; shown here for a
# typical Linux host.
staging_root = "/tmp/miscreant-staging"

# Directory for the disk part cache. Left unset (the built-in default), SlateDB
# uses its in-memory block cache and no part cache is installed. Set it to cache
# object parts on local disk: one cache, shared by SlateDB's SST reads and
# offloaded-blob reads, under a single byte budget.
# cache_dir = "/var/cache/miscreant"

# Capacity of the in-memory SlateDB block cache (parsed SST blocks), in bytes
# (512 MiB). Only meaningful when cache_dir is set; SST byte caching lives in
# the disk part cache.
cache_memory_bytes = 536870912

# Byte budget for the whole disk part cache directory (32 GiB). Only meaningful
# when cache_dir is set.
cache_disk_bytes = 34359738368

# Warm the disk part cache from the manifest at startup, before the listener
# binds, so the first request is served hot. Requires cache_dir.
warm_on_start = false

# zlib level (0-9) at which object content is deflated when written. Higher
# levels shrink stored objects (and the packs served from them) at the cost of
# more CPU at write time; inflate is level-agnostic, so this never affects
# reads.
object_compression_level = 6

# tracing-subscriber EnvFilter directive used when RUST_LOG is unset; RUST_LOG
# always overrides this.
log_filter = "info"
